services:
  mysql:
    image: mysql:8.0
    container_name: auction-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: auction_root_prod
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: auction
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - ./.data/mysql:/var/lib/mysql
      - ./docs/schema-v2.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pauction_root_prod"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: auction-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./server-go
      dockerfile: Dockerfile
    container_name: auction-backend
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.data/uploads:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: auction-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./admin-web/dist:/usr/share/nginx/html/admin:ro
      - ./mobile-h5/dist:/usr/share/nginx/html/mobile:ro
    depends_on:
      - backend
