openapi: 3.0.3
info:
  title: Live Auction API
  version: 2.0.0
  description: REST contract for the live auction platform. Source contract is docs/contract-v2.md.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []

tags:
  - name: Health
  - name: Auth
  - name: Auctions
  - name: Bids
  - name: Orders
  - name: Users
  - name: Uploads

paths:
  /health:
    get:
      tags: [Health]
      security: []
      summary: Process liveness check
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      tags: [Health]
      security: []
      summary: Dependency readiness check
      responses:
        "200":
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: One or more dependencies are unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /api/login:
    post:
      tags: [Auth]
      security: []
      summary: Mock login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginData"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/users/me:
    get:
      tags: [Users]
      summary: Get current user
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [user]
                        properties:
                          user:
                            $ref: "#/components/schemas/UserBrief"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /api/auctions:
    post:
      tags: [Auctions]
      summary: Create auction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuctionRequest"
      responses:
        "200":
          description: Auction created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Auctions]
      security: []
      summary: List auctions
      parameters:
        - $ref: "#/components/parameters/AuctionStatusQuery"
        - name: seller_id
          in: query
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/SizeQuery"
      responses:
        "200":
          description: Auction list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuctionListData"

  /api/auctions/{auction_id}:
    get:
      tags: [Auctions]
      security: []
      summary: Get auction detail
      parameters:
        - $ref: "#/components/parameters/AuctionId"
      responses:
        "200":
          description: Auction detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [Auctions]
      summary: Update pending auction
      parameters:
        - $ref: "#/components/parameters/AuctionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAuctionRequest"
      responses:
        "200":
          description: Auction updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  /api/auctions/{auction_id}/cancel:
    post:
      tags: [Auctions]
      summary: Cancel auction
      parameters:
        - $ref: "#/components/parameters/AuctionId"
      responses:
        "200":
          description: Auction cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  /api/auctions/{auction_id}/bid:
    post:
      tags: [Bids]
      summary: Place bid
      parameters:
        - $ref: "#/components/parameters/AuctionId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BidRequest"
      responses:
        "200":
          description: Bid accepted or business rejected.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BidAcceptedResponse"
                  - $ref: "#/components/schemas/BidBusinessRejectedResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"

  /api/auctions/{auction_id}/bids:
    get:
      tags: [Bids]
      security: []
      summary: List accepted bids
      parameters:
        - $ref: "#/components/parameters/AuctionId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
        - name: before_bid_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Accepted bid list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [list]
                        properties:
                          list:
                            type: array
                            items:
                              $ref: "#/components/schemas/Bid"

  /api/auctions/{auction_id}/status:
    get:
      tags: [Auctions]
      security: []
      summary: Get auction snapshot
      parameters:
        - $ref: "#/components/parameters/AuctionId"
      responses:
        "200":
          description: Auction snapshot.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuctionSnapshot"

  /api/auctions/{auction_id}/events:
    get:
      tags: [Auctions]
      security: []
      summary: Get events after sequence
      parameters:
        - $ref: "#/components/parameters/AuctionId"
        - name: after_seq
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        "200":
          description: Event compensation result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/EventListData"

  /api/orders/mine:
    get:
      tags: [Orders]
      summary: List orders as buyer
      parameters:
        - $ref: "#/components/parameters/OrderStatusQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/SizeQuery"
      responses:
        "200":
          description: Buyer orders.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /api/orders/seller:
    get:
      tags: [Orders]
      summary: List orders as seller
      parameters:
        - $ref: "#/components/parameters/OrderStatusQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/SizeQuery"
      responses:
        "200":
          description: Seller orders.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /api/orders/{order_id}:
    get:
      tags: [Orders]
      summary: Get order detail
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  /api/orders/{order_id}/pay:
    post:
      tags: [Orders]
      summary: Mock pay order
      parameters:
        - $ref: "#/components/parameters/OrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Payment result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"

  /api/uploads:
    post:
      tags: [Uploads]
      summary: Upload product image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    AuctionId:
      name: auction_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    PageQuery:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    SizeQuery:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    AuctionStatusQuery:
      name: status
      in: query
      schema:
        $ref: "#/components/schemas/AuctionStatus"
    OrderStatusQuery:
      name: status
      in: query
      schema:
        $ref: "#/components/schemas/OrderStatus"

  responses:
    ErrorResponse:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIResponse"

  schemas:
    APIResponse:
      type: object
      required: [code, msg, data]
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: ok
        data:
          nullable: true

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    ReadyResponse:
      type: object
      required: [status, mysql, redis]
      properties:
        status:
          type: string
          enum: [ok, error]
        mysql:
          type: string
          enum: [ok, error]
        redis:
          type: string
          enum: [ok, error]

    LoginRequest:
      type: object
      required: [nickname]
      properties:
        nickname:
          type: string
          minLength: 1
          maxLength: 32
        avatar:
          type: string
          nullable: true
          maxLength: 255

    LoginData:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserBrief"

    UserBrief:
      type: object
      required: [id, nickname, avatar]
      properties:
        id:
          type: integer
          format: int64
        nickname:
          type: string
        avatar:
          type: string
          nullable: true

    CreateAuctionRequest:
      type: object
      required: [title, start_price, price_step, start_time, duration_seconds]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 128
        description:
          type: string
          nullable: true
          maxLength: 2000
        cover_url:
          type: string
          nullable: true
          maxLength: 512
        images:
          type: array
          nullable: true
          maxItems: 9
          items:
            type: string
            maxLength: 512
        stream_url:
          type: string
          nullable: true
          maxLength: 512
        start_price:
          type: integer
          format: int64
          minimum: 0
        price_step:
          type: integer
          format: int64
          minimum: 1
        ceiling_price:
          type: integer
          format: int64
          nullable: true
        start_time:
          type: string
          format: date-time
        duration_seconds:
          type: integer
          minimum: 30
          maximum: 86400
        extend_seconds:
          type: integer
          default: 30
          minimum: 10
          maximum: 30
        extend_threshold:
          type: integer
          default: 30
          minimum: 1
          maximum: 300

    UpdateAuctionRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 128
        description:
          type: string
          nullable: true
          maxLength: 2000
        cover_url:
          type: string
          nullable: true
          maxLength: 512
        images:
          type: array
          nullable: true
          maxItems: 9
          items:
            type: string
            maxLength: 512
        stream_url:
          type: string
          nullable: true
          maxLength: 512
        start_price:
          type: integer
          format: int64
          minimum: 0
        price_step:
          type: integer
          format: int64
          minimum: 1
        ceiling_price:
          type: integer
          format: int64
          nullable: true
        start_time:
          type: string
          format: date-time
        duration_seconds:
          type: integer
          minimum: 30
          maximum: 86400
        extend_seconds:
          type: integer
          minimum: 10
          maximum: 30
        extend_threshold:
          type: integer
          minimum: 1
          maximum: 300

    AuctionStatus:
      type: string
      enum: [pending, active, ended, cancelled]

    OrderStatus:
      type: string
      enum: [pending_pay, paid, closed]

    Auction:
      type: object
      required:
        - id
        - title
        - start_price
        - price_step
        - current_price
        - start_time
        - end_time
        - original_end_time
        - extend_seconds
        - extend_threshold
        - status
        - version
        - seller
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
          nullable: true
        cover_url:
          type: string
          nullable: true
        images:
          type: array
          nullable: true
          maxItems: 9
          items:
            type: string
        stream_url:
          type: string
          nullable: true
        start_price:
          type: integer
          format: int64
        price_step:
          type: integer
          format: int64
        ceiling_price:
          type: integer
          format: int64
          nullable: true
        current_price:
          type: integer
          format: int64
        current_leader:
          $ref: "#/components/schemas/UserBriefNullable"
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        original_end_time:
          type: string
          format: date-time
        extend_seconds:
          type: integer
        extend_threshold:
          type: integer
        status:
          $ref: "#/components/schemas/AuctionStatus"
        version:
          type: integer
          format: int64
        viewer_count:
          type: integer
        bid_count:
          type: integer
          format: int64
        seller:
          $ref: "#/components/schemas/UserBrief"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserBriefNullable:
      nullable: true
      allOf:
        - $ref: "#/components/schemas/UserBrief"

    AuctionResponse:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: object
              required: [auction]
              properties:
                auction:
                  $ref: "#/components/schemas/Auction"

    AuctionListData:
      type: object
      required: [list, total, page, size, server_time]
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/Auction"
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer
        server_time:
          type: string
          format: date-time

    BidRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1

    Bid:
      type: object
      required: [id, auction_id, user, amount, status, created_at]
      properties:
        id:
          type: integer
          format: int64
        auction_id:
          type: integer
          format: int64
        user:
          $ref: "#/components/schemas/UserBrief"
        amount:
          type: integer
          format: int64
        status:
          type: string
          enum: [accepted, rejected]
        reject_reason:
          type: string
          nullable: true
        idempotency_key:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    BidAcceptedResponse:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: object
              required: [bid, auction_version, current_price, current_leader, extended, new_end_time, server_time]
              properties:
                bid:
                  $ref: "#/components/schemas/Bid"
                auction_version:
                  type: integer
                  format: int64
                current_price:
                  type: integer
                  format: int64
                current_leader:
                  $ref: "#/components/schemas/UserBrief"
                extended:
                  type: boolean
                new_end_time:
                  type: string
                  format: date-time
                server_time:
                  type: string
                  format: date-time

    BidBusinessRejectedResponse:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              nullable: true

    AuctionSnapshot:
      type: object
      required: [auction, top_bids, last_event_seq, server_time]
      properties:
        auction:
          $ref: "#/components/schemas/Auction"
        top_bids:
          type: array
          items:
            $ref: "#/components/schemas/Bid"
        last_event_seq:
          type: integer
          format: int64
        server_time:
          type: string
          format: date-time

    EventEnvelope:
      type: object
      required: [type, event_id, auction_id, seq, server_time, data]
      properties:
        type:
          type: string
          enum: [snapshot, bid_update, auction_extended, auction_started, auction_ended, auction_cancelled, viewer_count]
        event_id:
          type: string
        auction_id:
          type: integer
          format: int64
        seq:
          type: integer
          format: int64
        server_time:
          type: string
          format: date-time
        data:
          type: object

    EventListData:
      type: object
      required: [events, has_more, snapshot_required, server_time]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/EventEnvelope"
        has_more:
          type: boolean
        snapshot_required:
          type: boolean
        server_time:
          type: string
          format: date-time

    Order:
      type: object
      required: [id, auction_id, winner, seller, final_price, status, created_at, paid_at]
      properties:
        id:
          type: integer
          format: int64
        auction_id:
          type: integer
          format: int64
        winner:
          $ref: "#/components/schemas/UserBrief"
        seller:
          $ref: "#/components/schemas/UserBrief"
        final_price:
          type: integer
          format: int64
        status:
          $ref: "#/components/schemas/OrderStatus"
        created_at:
          type: string
          format: date-time
        paid_at:
          type: string
          format: date-time
          nullable: true

    OrderResponse:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: object
              required: [order]
              properties:
                order:
                  $ref: "#/components/schemas/Order"

    OrderListResponse:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: object
              required: [list, total, page, size]
              properties:
                list:
                  type: array
                  items:
                    $ref: "#/components/schemas/Order"
                total:
                  type: integer
                page:
                  type: integer
                size:
                  type: integer

    UploadData:
      type: object
      required: [url, width, height, size]
      properties:
        url:
          type: string
        width:
          type: integer
        height:
          type: integer
        size:
          type: integer

    UploadResponse:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UploadData"

